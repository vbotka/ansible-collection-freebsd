---
# Generated by .configure.yml
# Handlers for git_daemon
- name: Start git_daemon
  listen: start git_daemon
  vbotka.freebsd.service:
    script: git_daemon
    command: start

- name: Stop git_daemon
  listen: stop git_daemon
  vbotka.freebsd.service:
    script: git_daemon
    command: stop

- name: Restart git_daemon
  listen: restart git_daemon
  when: fp_git_daemon_enable | bool
  vbotka.freebsd.service:
    script: git_daemon
    command: restart

- name: Reload git_daemon
  listen: reload git_daemon
  when: fp_git_daemon_enable | bool
  vbotka.freebsd.service:
    script: git_daemon
    command: reload

# EOF
