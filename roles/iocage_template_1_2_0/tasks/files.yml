- name: "Files: Copy files."
  ansible.builtin.include_tasks:
    file: fn/files.yml
    apply:
      tags: fit_files
  loop: "{{ fit_templates | dict2items
                          | rejectattr('key', 'in', fit_iocage_templates)
                          | subelements('value.files', skip_missing=true) }}"
  loop_control:
    loop_var: outer_item
    label: "{{ outer_item.0.key }}"
