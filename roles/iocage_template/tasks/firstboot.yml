- name: "Firstboot: Create scripts."
  ansible.builtin.copy:
    dest: "{{ freebsd_iocage_mount }}/jails/{{ item.0.key }}/root/etc/rc.d/{{ item.1.key }}"
    content: "{{ item.1.value.content }}"
    mode: '0555'
  loop: "{{ fit_templates | dict2items
                          | rejectattr('key', 'in', fit_iocage_templates)
                          | subelements('value.firstboot', skip_missing=true) }}"
  loop_control:
    label: "{{ item.0.key }} {{ item.1.key }}"

- name: "Firstboot: Debug create scripts fit_debug2={{ fit_debug2 }}"
  when: fit_debug2 | bool
  ansible.builtin.debug:
    var: out

- name: "Firstboot: Touch /firstboot."
  ansible.builtin.file:
    path: "{{ freebsd_iocage_mount }}/jails/{{ item.key }}/root/firstboot"
    state: touch
    modification_time: preserve
    access_time: preserve
  loop: "{{ fit_templates | dict2items
                          | rejectattr('key', 'in', fit_iocage_templates) }}"
  loop_control:
    label: "{{ item.key }}"
