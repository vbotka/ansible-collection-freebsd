- name: "Setup: Get iocage list of templates."
  register: out_templates
  changed_when: false
  ansible.builtin.command: iocage list --template --long

- name: "Setup: End host if all templates already created."
  when: fit_templates | difference(fit_iocage_templates) | length == 0
  block:

    - name: "Setup: All templates already created."
      ansible.builtin.debug:
        msg: All templates already created. End host.

    - name: "Setup: End host."
      ansible.builtin.meta: end_host
