- name: "Sudo: Configure sudo."
  register: out
  ansible.builtin.lineinfile:
    path: "{{ freebsd_iocage_mount }}/jails/{{ item.key }}/root/usr/local/etc/sudoers"
    line: "{{ item.value.user }} ALL=(ALL) NOPASSWD: ALL"
    backup: true
  loop: "{{ fit_templates | dict2items
                          | rejectattr('key', 'in', fit_iocage_templates)
                          | selectattr('value.user', 'defined') }}"
  loop_control:
    label: "{{ item.key }} {{ item.value.user }}"

- name: "Sudo: Debug configure sudo fit_debug2={{ fit_debug2 }}"
  when: fit_debug2 | bool
  ansible.builtin.debug:
    var: out
