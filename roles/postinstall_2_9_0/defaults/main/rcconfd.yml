---
fp_rcconfd: false
fp_rcconfd_dir: /etc/rc.conf.d
fp_rcconfd_file:
  apcupsd: apcupsd
  devd: devd
  devfs: devfs
  digitalocean: digitalocean
  git_daemon: git_daemon
  hostapd: hostapd
  hostname: hostname
  inetd: inetd
  linux: linux
  motd: motd
  ntpd: ntpd
  ntpdate: ntpdate
  qemu: qemu
  qemu_user_static: qemu_user_static
  smartd: smartd
  snmpd: snmpd
  sshd: sshd
  syslog-ng: syslog-ng
  syslogd: syslogd
  tmpmfs: tmpmfs
  wpasupplicant: wpasupplicant
fp_rcconfd_path: "{{ dict(fp_rcconfd_file.keys()
                          | zip([fp_rcconfd_dir]
                                | product(fp_rcconfd_file.values())
                                | map('join', '/'))) }}"
