- name: "Stop: Get iocage list of jails."
  register: out_jails
  changed_when: false
  ansible.builtin.command: iocage list --long

- name: "Stop: Display iocage_jails fit_debug={{ fit_debug }}"
  when: fit_debug | bool
  ansible.builtin.debug:
    var: fit_iocage_jails

- name: Stop created jails.
  when: _jails | length > 0
  vars:
    _jails_started: "{{ fit_iocage_jails | dict2items
                                         | selectattr('value.state', 'eq', 'up')
                                         | map(attribute='key') }}"
    _jails: "{{ fit_templates | difference(fit_iocage_templates)
                              | intersect(_jails_started) }}"
  block:

    - name: "Stop: Stop jails."
      register: out
      changed_when: false
      ansible.builtin.command: >-
        iocage stop
        {{ _jails | join(' ') }}

    - name: "Stop: Debug stop jails fit_debug2={{ fit_debug2 }}"
      when: fit_debug2 | bool
      ansible.builtin.debug:
        var: out
