- name: Create and start project jails from iocage templates.
  hosts: iocage

  vars:

    iocage_jails: "{{ out_jails.stdout | vbotka.freebsd.iocage('jails') }}"
    iocage_jails_started: "{{ iocage_jails | dict2items
                                           | selectattr('value.state', 'eq', 'up')
                                           | map(attribute='key') }}"

  tasks:

    - name: Display vars.  # noqa: run-once
      tags: debug
      when: debug | d(false) | bool
      vars:
        project_jails_present: "{{ project | intersect(groups.all) }}"
        project_jails_absent: "{{ project | difference(groups.all) }}"
      run_once: true
      ansible.builtin.debug:
        msg: |
          project:
            {{ project | to_nice_yaml(indent=2) | indent(2) }}
          vmm:
            {{ vmm | to_nice_yaml(indent=2) | indent(2) }}
          groups.all: {{ groups.all }}
          project_jails_present: {{ project_jails_present }}
          project_jails_absent: {{ project_jails_absent }}

    - name: Create and start jails.
      tags: create
      vars:
        iocage_jails_absent: "{{ vmm[inventory_hostname] | difference(groups.all) }}"
        iocage_jails_created: "{{ out.results | map(attribute='stdout') | map('split') | map('first') }}"
      block:

        - name: Display iocage_jails_absent
          when: debug | d(false) | bool
          ansible.builtin.debug:
            var: iocage_jails_absent

        - name: All jails already created. End host.
          when: iocage_jails_absent | length == 0
          ansible.builtin.meta: end_host

        - name: Create jails from templates.
          changed_when: false
          register: out
          vars:
            _notes: >
              "vmm={{ inventory_hostname }}
              class={{ vmm[inventory_hostname][item]['class'] | join(',') }}"
            _properties: >
              {{ vmm[inventory_hostname][item]['properties']
                 | d(properties)
                 | dictsort | map('join', '=') | join(' ') }}
              notes={{ _notes }}
          ansible.builtin.command: >
            iocage create
            --name {{ item }}
            --template {{ vmm[inventory_hostname][item]['template'] }}
            {{ _properties }}
          loop: "{{ iocage_jails_absent }}"

        - name: Display iocage_jails_created
          when: debug | d(false) | bool
          ansible.builtin.debug:
            var: iocage_jails_created

        - name: Get iocage list of jails.
          register: out_jails
          changed_when: false
          ansible.builtin.command: iocage list --long

        - name: Display iocage_jails_started
          when: debug | d(false) | bool
          ansible.builtin.debug:
            var: iocage_jails_started

        - name: Start created jails.
          when:
            - iocage_jails_created | difference(iocage_jails_started) | length > 0
            - start | d(true) | bool
          changed_when: false
          ansible.builtin.command: >
            iocage start
            {{ iocage_jails_created | difference(iocage_jails_started) | join(' ') }}
