- name: Set properties.
  changed_when: false
  vars:
    _notes: >
      "vmm={{ inventory_hostname }}
      class={{ vmm[inventory_hostname][item]['class'] | d([]) | join(',') }}
      {{ vmm[inventory_hostname][item]['notes'] | d('') }}"
    _properties: >
      {{ vmm[inventory_hostname][item]['properties']
         | d(properties)
         | dictsort | map('join', '=') | join(' ') }}
      notes={{ _notes }}
  ansible.builtin.command: >
    iocage set
    {{ _properties }}
    {{ item }}
  loop: "{{ vmm[inventory_hostname].keys() }}"
