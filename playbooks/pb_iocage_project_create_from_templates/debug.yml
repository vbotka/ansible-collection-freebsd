- name: "Debug: Display variables."
  ansible.builtin.debug:
    msg: |
      project:
        {{ project | to_nice_yaml(indent=2) | indent(2) }}
      properties:
        {{ properties | to_nice_yaml(indent=2) | indent(2) }}
      vmm:
        {{ vmm | to_nice_yaml(indent=2) | indent(2) }}
      groups:
        {{ groups | to_nice_yaml(indent=2) | indent(2) }}
