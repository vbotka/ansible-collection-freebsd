- name: Fetch plugins required by project.

  vars:

    project_list: "{{ project | dict2items | map(attribute='value') }}"
    project_vmm: "{{ project_list | community.general.lists_mergeby(project_list, 'vmm', list_merge='append_rp')
                                  | items2dict(key_name='vmm', value_name='class') }}"
    required_plugins: "{{ project_vmm[inventory_hostname] | map('extract', classes)
                                                          | unique | sort }}"
    selected_plugins: "{{ plugins | dict2items
                                  | selectattr('key', 'in', required_plugins)
                                  | rejectattr('key', 'in', iocage_plugins) }}"

  block:

    - name: "Debug required plugins debug={{ debug }}"
      when: debug | bool
      ansible.builtin.debug:
        msg: |
          required_plugins:
            {{ required_plugins | to_nice_yaml }}
          selected_plugins:
            {{ selected_plugins | to_nice_yaml }}
          project_vmm:
            {{ project_vmm | to_yaml }}

    - name: Check all required plugins are included in the dictionary plugins.
      when: check_plugins | d(true)
      ansible.builtin.assert:
        that: required_plugins | difference(plugins.keys()) | length == 0
        fail_msg: "[ERR] Not all required plugins are included in plugins."
        quiet: true

    - name: "Debug commands debug={{ debug }}"
      when: debug | bool
      ansible.builtin.debug:
        msg: |
          {{ cmd_fetch }}
      loop: "{{ selected_plugins }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Fetch required plaugins.
      changed_when: false
      ansible.builtin.command: "{{ cmd_fetch }}"
      loop: "{{ selected_plugins }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Stop fetched plugins.
      changed_when: false
      when: stop_plugins | d(true) | bool
      ansible.builtin.command: >
        iocage stop
        {{ selected_plugins | map(attribute='key') | join(' ') }}
