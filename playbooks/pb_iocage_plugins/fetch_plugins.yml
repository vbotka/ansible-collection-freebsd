- name: Fetch enabled plugins.
  block:

    - name: Set required plugins.
      ansible.builtin.set_fact:
        required_plugins: "{{ enabled_plugins }}"

    - name: "Debug selected plugins debug={{ debug }}"
      when: debug | bool
      ansible.builtin.debug:
        msg: |
          required_plugins:
            {{ required_plugins | to_nice_yaml }}
          selected_plugins:
            {{ selected_plugins | to_nice_yaml }}

    - name: Check all required plugins are included in the dictionary plugins.
      when: check_plugins | d(true)
      ansible.builtin.assert:
        that: enabled_plugins | difference(plugins.keys()) | length == 0
        fail_msg: "[ERR] Not all enabled plugins are included in plugins."
        quiet: true

    - name: "Debug commands debug={{ debug }}"
      when: debug | bool
      ansible.builtin.debug:
        msg: |
          {{ cmd_fetch }}
      loop: "{{ selected_plugins }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Fetch enabled plugins.
      changed_when: false
      ansible.builtin.command: "{{ cmd_fetch }}"
      loop: "{{ selected_plugins }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Stop fetched plugins.
      changed_when: false
      when:
        - stop_plugins | d(true) | bool
        - selected_plugins | length > 0
      ansible.builtin.command: >
        iocage stop
        {{ selected_plugins | map(attribute='key') | join(' ') }}
