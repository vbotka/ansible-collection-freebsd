---
- name: Stop and convert ansible_syslogng_client to template.
  hosts: iocage_05

  tasks:

    - name: Stop ansible_syslogng_client
      ansible.builtin.command: iocage stop ansible_syslogng_client

    - name: Convert ansible_syslogng_client jail to template.
      ansible.builtin.command: iocage set template=1 ansible_syslogng_client
