freebsd_iocage_pool: zroot
freebsd_iocage_pool_mount: /zroot
freebsd_iocage_mount: /zroot/iocage

templates:
  ansible_client:
    release: 15.0-RELEASE
    properties:
      bpf: 1
      dhcp: 1
      vnet: 1
    dhclient: "{{ act_dhclient | dict2items }}"
    rcconf: "{{ act_rcconf | dict2items }}"
    # pkglist: /tmp/ansible/ansible_client/pkgs.json

# pkg
act_pkg_install: true
act_pkg:
  - python311
  - sudo

# ansible client template defaults
act_user: admin
act_pk: pk_admins.txt
act_sudo: true
act_rcconf:
  iocage_enable: "YES"
  sshd_enable: "YES"
act_dhclient: {}

clones:
  test_151:
    clone_from: ansible_client
    properties:
      ip4_addr: 'vnet0|10.1.0.151/24'
  test_152:
    clone_from: ansible_client
    properties:
      ip4_addr: 'vnet0|10.1.0.152/24'
  test_153:
    clone_from: ansible_client
    properties:
      ip4_addr: 'vnet0|10.1.0.153/24'

# clones default properties
properties:
  bpf: 1
  vnet: 1
  defaultrouter: '10.1.0.1'  # Note 1.
  notes: "vmm={{ inventory_hostname }}"

start: "{{ clones.keys() }}"

# Notes:
#
# 1) The property defaultrouter is needed when the host's defaultrouter is
# different. For example:
#
# shell> grep defaultrouter /etc/rc.conf
# defaultrouter="10.10.0.1"
#
# In this case, iocage would not start the jails
# fatal: [iocage_05]: FAILED! => 
#     changed: true
#     cmd:
#     - iocage
#     - start
#     - test_151
#     - test_152
#     - test_153
#     delta: '0:00:01.052223'
#     end: '2026-03-07 14:13:22.495411'
#     msg: non-zero return code
#     rc: 1
#     start: '2026-03-07 14:13:21.443188'
#     stderr: |-
#         No default gateway found for ipv6.
#           + Configuring VNET FAILED
#           route: message indicates error: Invalid argument
#         add net default: gateway 10.10.0.1 fib 0: Invalid argument
#
# AI: "In FreeBSD, iocage sets the default gateway for a jail primarily through
# the VNET (Virtual Networking) configuration, where the jail maintains its own
# network stack [1, 18]. When using VNET, the default gateway is typically set
# to the IP address of the bridge interface on the host to which the jail's
# virtual network interface (epair) is connected."
