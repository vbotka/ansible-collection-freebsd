---
- name: Stop and convert ansible_syslogng_server to template.
  hosts: iocage_05

  tasks:

    - name: Stop ansible_syslogng_server
      ansible.builtin.command: iocage stop ansible_syslogng_server

    - name: Convert ansible_syslogng_server jail to template.
      ansible.builtin.command: iocage set template=1 ansible_syslogng_server
