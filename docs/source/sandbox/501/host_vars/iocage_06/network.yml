fn_gateway_enable: true
fn_defaultrouter: 10.10.58.1

fn_wlans:
  - {device: rtw890, interface: wlan0}

fn_cloned_interfaces:
  - {interface: bridge0, state: value_present}

fn_interfaces:
  - interface: wlan0
    options: WPA SYNCDHCP
    create: country US regdomain ETSI
  - interface: bridge0
    options: inet 172.16.99.1/24
