- name: Test Log Client.
  hosts: logclient_group

  vars:

    log_serv: "{{ hostvars['logserv']['iocage_ip4'] }}"
    
  tasks:

    - name: Run loggen
      register: out
      ansible.builtin.command: "loggen -i -S -n 1 {{ log_serv }} 514"

    - name: Debug.
      ansible.builtin.debug:
        var: out.stderr
