plugin: vbotka.freebsd.iocage
host: handy
user: admin
sudo: true
get_properties: true
compose:
  ansible_host: "'iocage_05'"
  ansible_port: iocage_ip4 | split('.') | last | int - 100 + 2200
  ansible_python_interpreter: "'auto_silent'"
  iocage_tags: dict(iocage_properties.notes | regex_findall('(\w+)=(\w+)'))
