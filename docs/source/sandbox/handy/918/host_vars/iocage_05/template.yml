freebsd_iocage_mount: /zroot/iocage

fit_templates:
  ansible_init:
    release: 15.0-RELEASE
    pkglist: /tmp/ansible/ansible_init/pkgs.json
    file_lines: "{{ fit_file_lines | dict2items }}"
    firstboot: "{{ fit_firstboot | dict2items }}"
    rcconf: "{{ fit_rcconf | dict2items }}"
    properties:
      bpf: 1
      dhcp: 1
      vnet: 1
      notes: class=init

fit_rcconf:
  ansible_init_enable: "YES"
  ansible_init_host: "10.10.99.134"
  ansible_init_playbook: "pb-init.yml"

fit_firstboot:
  ansible_init:
    content: |
      #!/bin/sh
      #
      # PROVIDE: Pull and execute ansible-conf-init
      # REQUIRE: FILESYSTEMS NETWORKING
      # KEYWORD: firstboot

      . /etc/rc.subr

      name="ansible_init"
      desc="Firstboot ansible-pull"
      rcvar="ansible_init_enable"
      start_cmd="ansible_init_start"

      : ${ansible_init_repo:="ansible-conf-init"}
      : ${ansible_init_dest:="/root"}
      : ${ansible_init_playbook:="pb.yml"}

      ansible_init_start() {
          echo "Configuring system for the first time by ansible-pull."
          ansible-pull -i hosts -U ${ansible_init_host}/${ansible_init_repo} -d /${ansible_init_dest}/${ansible_init_repo} ${ansible_init_playbook}
      }

      load_rc_config $name
      run_rc_command "$1"

fit_file_lines:
  /root/.profile:
    LC_ALL: en_US.UTF-8

fit_file_options:
  /root/.profile:
    assignment_operator: '='
    owner: root
    group: wheel
    mode: '0644'
