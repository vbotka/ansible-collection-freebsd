---
- name: Create jails from iocage plugins.
  hosts: iocage_05

  tasks:

    - name: Create jail.
      vars:
        _notes: >
          "vmm={{ inventory_hostname }}
          class=ansible-pull
          alias=test"
      ansible.builtin.command: >
        iocage clone
        ansible-pull-test
        --newmac
        {{ properties | dictsort | map('join', '=') | join(' ') }}
        notes={{ _notes }}
