# The project keys are jails aliases.
project:
  logserv:
    class: [logserv]
    plugin: ansible-syslogng
    vmm: iocage_05
    properties:
      dhcp: 0
      vnet: 1
      defaultrouter: "{{ project_hosts.defaultrouter }}"
      ip4_addr: 'vnet0|{{ project_hosts.log_server }}/24'
      type: jail
      boot: 1
  foo:
    class: [logclient]
    plugin: ansible-syslogng
    vmm: iocage_05
  bar:
    class: [logclient]
    plugin: ansible-syslogng
    vmm: iocage_05

plugins:
  ansible-syslogng:
    git: https://github.com/vbotka/iocage-plugins-devel
    branch: main
    properties:
      bpf: 1
      dhcp: 1
      vnet: 1
      boot: 0

# Jail properties.
properties:
  bpf: 1
  dhcp: 1
  vnet: 1
  type: jail
  boot: 1

# Declare vmm. Dictionary of iocage hosts.
vmm_groups: "{{ dict(project | dict2items | groupby('value.vmm')) }}"
vmm: "{{ dict(vmm_groups.keys() | zip(vmm_groups.values() | map('items2dict'))) }}"
