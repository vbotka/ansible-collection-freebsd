- name: Configure and start git_daemon
  hosts: iocage
  gather_facts: true
  remote_user: admin
  become: true

  tasks:

    - name: Install git.
      community.general.pkgng:
        name: git

    - name: Configure and start Git Server.
      ansible.builtin.import_role:
        name: vbotka.freebsd.postinstall
        tasks_from: gitserver.yml
